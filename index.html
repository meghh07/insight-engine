<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insight Engine</title>

<!-- Chart Library -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin: 0;
  background: #020617;
  color: white;
  font-family: Arial;
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  width: 20%;
  padding: 20px;
}

.center {
  width: 60%;
}

.right {
  width: 20%;
  padding: 20px;
}

#chart {
  height: 60vh;
}

button {
  background: transparent;
  border: 1px solid #00f5a0;
  color: #00f5a0;
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: #00f5a0;
  color: black;
}

h1 {
  color: #00f5a0;
}

.box {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h1 id="coinTitle">BTC</h1>
  <h2 id="price">$--</h2>

  <div class="box">Market Cap: <span id="marketCap">--</span></div>
  <div class="box">Volume: <span id="volume">--</span></div>
</div>

<!-- CENTER -->
<div class="center">
  <div id="chart"></div>

  <div style="text-align:center">
    <button onclick="changeCoin('bitcoin')">BTC</button>
    <button onclick="changeCoin('ethereum')">ETH</button>
    <button onclick="changeCoin('solana')">SOL</button>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <h2>AI Prediction</h2>
  <div id="prediction">Loading...</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
