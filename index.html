<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CryptoTrace — AI Prediction Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanlines"></div>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">CryptoTrace</span>
      </div>
      <div class="header-right">
        <span class="live-badge"><span class="pulse-dot"></span>LIVE</span>
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">

      <aside class="left-panel">

        <!-- Coin Info -->
        <div class="card coin-info">
          <h1 class="coin-name" id="coinName">BITCOIN</h1>
          <div class="coin-price" id="coinPrice">$67,719</div>
          <div class="coin-meta">
            <span class="change" id="coinChange">+2.41%</span>
            <span class="meta-label">24h</span>
          </div>
          <div class="coin-stats">
            <div class="stat">
              <span class="stat-label">24H HIGH</span>
              <span class="stat-value" id="stat24hHigh">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">24H LOW</span>
              <span class="stat-value" id="stat24hLow">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">VOLUME</span>
              <span class="stat-value" id="statVol">—</span>
            </div>
          </div>
        </div>

        <!-- AI Panel -->
        <div class="card ai-panel">
          <div class="ai-header">
            <span class="ai-icon">⬡</span>
            <span>AI Prediction</span>
          </div>
          <div class="ai-verdict">
            <span class="verdict-arrow up" id="verdictArrow">▲</span>
            <span class="verdict-label up" id="verdictLabel">UP</span>
          </div>
          <div class="ai-confidence">
            <span class="conf-label">Confidence</span>
            <div class="conf-bar-wrap">
              <div class="conf-bar" id="confBar" style="width:72%"></div>
            </div>
            <span class="conf-pct" id="confPct">72%</span>
          </div>
          <p class="ai-reason" id="aiReason">
            Strong bullish momentum. RSI above 60, MACD bullish crossover observed.
          </p>
          <button class="refresh-btn" id="refreshBtn">
            <span class="btn-icon" id="btnIcon">↻</span> Refresh Prediction
          </button>
        </div>

      </aside>

      <!-- Chart Section -->
      <section class="chart-section card">
        <div class="chart-topbar">
          <div class="timeframes">
            <button class="tf-btn active" data-tf="1H">1H</button>
            <button class="tf-btn" data-tf="4H">4H</button>
            <button class="tf-btn" data-tf="1D">1D</button>
            <button class="tf-btn" data-tf="1W">1W</button>
          </div>
          <div class="current-price-tag" id="chartPriceTag">$67,722.17</div>
        </div>

        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>

        <div class="coin-selector">
          <button class="coin-btn active" data-coin="BTC">BTC</button>
          <button class="coin-btn" data-coin="ETH">ETH</button>
          <button class="coin-btn" data-coin="SOL">SOL</button>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
