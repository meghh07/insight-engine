<!DOCTYPE html>
<html>
<head>
  <title>Chart Test</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body { background: #020617; margin: 0; }
    #chart { width: 100%; height: 400px; }
  </style>
</head>

<body>

<div id="chart"></div>

<script>
window.onload = function () {

  console.log("Starting chart...");

  const container = document.getElementById("chart");

  const chart = LightweightCharts.createChart(container, {
    width: window.innerWidth,
    height: 400,
    layout: {
      background: { color: "#020617" },
      textColor: "#fff"
    }
  });

  const candleSeries = chart.addCandlestickSeries();

  candleSeries.setData([
    { time: '2024-01-01', open: 100, high: 110, low: 90, close: 105 },
    { time: '2024-01-02', open: 105, high: 115, low: 95, close: 100 },
    { time: '2024-01-03', open: 100, high: 120, low: 98, close: 115 }
  ]);

  console.log("✅ Chart rendered");

};
</script>

</body>
</html>
