<!DOCTYPE html>
<html>
<head>
  <title>Insight Engine</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>⚡ INSIGHT ENGINE</h1>

  <div class="main">

    <!-- LEFT: CHART -->
    <div class="left">
      <canvas id="chart"></canvas>

      <div class="buttons">
        <button onclick="loadChart(1)">1m</button>
        <button onclick="loadChart(5)">5m</button>
        <button onclick="loadChart(15)">15m</button>
      </div>
    </div>

    <!-- RIGHT: DATA -->
    <div class="right">

      <div class="card">
        <h2>BTC</h2>
        <p id="btc"></p>
      </div>

      <div class="card">
        <h2>ETH</h2>
        <p id="eth"></p>
      </div>

      <div class="card">
        <h2>SOL</h2>
        <p id="sol"></p>
      </div>

      <div class="card">
        <h2>Volume</h2>
        <p id="volume"></p>
      </div>

      <div class="card">
        <h2>Transactions (TNX)</h2>
        <p id="tnx"></p>
      </div>

      <div class="card">
        <h2>AI Prediction (10 min)</h2>
        <p id="prediction"></p>
        <p id="confidence"></p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
