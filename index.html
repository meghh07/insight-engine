<!DOCTYPE html>
<html>
<head>
  <title>Insight Engine</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>⚡ INSIGHT ENGINE</h1>

  <!-- COIN CARDS -->
  <div class="coins">
    <div class="card"><h3>BTC</h3><p id="btc"></p></div>
    <div class="card"><h3>ETH</h3><p id="eth"></p></div>
    <div class="card"><h3>SOL</h3><p id="sol"></p></div>
  </div>

  <!-- TIMEFRAME -->
  <div class="buttons">
    <button onclick="loadChart('1')">1m</button>
    <button onclick="loadChart('5')">5m</button>
    <button onclick="loadChart('15')">15m</button>
  </div>

  <!-- CHART -->
  <canvas id="chart"></canvas>

  <!-- METRICS -->
  <div class="metrics">
    <div class="card">Volume: <span id="volume"></span></div>
    <div class="card">TNX: <span id="tnx"></span></div>
  </div>

  <!-- AI -->
  <div class="card">
    <h3>AI Prediction (10 min)</h3>
    <p id="prediction"></p>
    <p id="confidence"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
