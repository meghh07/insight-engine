<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<!DOCTYPE html>
<html>
<head>
  <title>Insight Engine</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h2>BTC</h2>
    <p id="btc-price">--</p>

    <div class="stat">
      <span>Market Cap</span>
      <span>$1.2T</span>
    </div>

    <div class="stat">
      <span>Volume</span>
      <span id="volume">--</span>
    </div>

    <div class="stat">
      <span>Transactions</span>
      <span id="tnx">--</span>
    </div>
  </div>

  <!-- MAIN CHART -->
  <div class="main-panel">
    <div class="chart-header">
      <button onclick="changeInterval(1)">1m</button>
      <button onclick="changeInterval(5)">5m</button>
      <button onclick="changeInterval(15)">15m</button>
    </div>

    <div id="chart"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="card">
      <h3>AI Prediction (10 min)</h3>
      <p id="prediction">--</p>
      <p id="confidence"></p>
    </div>

    <div class="card">
      <h3>Sentiment</h3>
      <div class="sentiment">
        <div class="bull" id="bull">70%</div>
        <div class="bear" id="bear">30%</div>
      </div>
    </div>

    <div class="card">
  <h3>Coins</h3>
  <div class="coin-buttons">
    <button onclick="changeCoin('bitcoin')">BTC</button>
    <button onclick="changeCoin('ethereum')">ETH</button>
    <button onclick="changeCoin('solana')">SOL</button>
  </div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
