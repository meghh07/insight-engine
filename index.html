<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insight Engine Pro</title>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin: 0;
  background: #020617;
  color: white;
  font-family: Arial;
}

.container {
  display: flex;
  height: 100vh;
}

.left, .right {
  width: 20%;
  padding: 20px;
}

.center {
  width: 60%;
}

#chart {
  height: 500px;
}

button {
  border: 1px solid #00f5a0;
  background: transparent;
  color: #00f5a0;
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

h1 {
  color: #00f5a0;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <h1 id="coin">BTC</h1>
  <h2 id="price">$--</h2>
</div>

<div class="center">
  <div id="chart"></div>

  <div style="text-align:center">
    <button onclick="changeCoin('bitcoin')">BTC</button>
    <button onclick="changeCoin('ethereum')">ETH</button>
    <button onclick="changeCoin('solana')">SOL</button>
  </div>
</div>

<div class="right">
  <h2>AI Prediction</h2>
  <div id="prediction">--</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
